name: Full Environment

on:
  workflow_dispatch:
    inputs:
      centralRelease:
        type: boolean
        description: Run a release to Maven Central (requires secrets)
        default: false

permissions:
  contents: read
  packages: write

env:
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  CENTRAL_PROFILE: ${{ inputs.centralRelease == true && '-Psonatype-distribution,release' || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    name: Full Environment Build
    steps:

      # ── Setup ──────────────────────────────────────
      - uses: actions/checkout@v6.0.2
        with:
          submodules: 'recursive'
          fetch-depth: 0
          show-progress: 'true'
          token: ${{ secrets.BUILD_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '25'
          distribution: 'oracle'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Cache Maven packages
        uses: actions/cache@v5.0.4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Setup Maven
        uses: actionctl/setup-maven-cli@v1
        with:
          maven_version: '4.0.0-rc-5'
          download_url_pattern: 'https://dlcdn.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz'

      - name: Update Settings.xml
        uses: s4u/maven-settings-action@v4.0.0
        with:
          sonatypeSnapshots: true
          servers: >
            [
              {
                "id": "github",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "packages",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "packages_jwebmp",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "sona-snapshot",
                "username": "${{ secrets.SONA_USERNAME }}",
                "password": "${{ secrets.SONA_PASSWORD }}"
              },
              {
                "id": "sona-release",
                "username": "${{ secrets.SONA_USERNAME }}",
                "password": "${{ secrets.SONA_PASSWORD }}"
              }
            ]
          repositories: >
            [
              {
                "id": "packages",
                "name": "packages",
                "url": "https://maven.pkg.github.com/GuicedEE/Packages",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              },
              {
                "id": "packages_jwebmp",
                "name": "packages_jwebmp",
                "url": "https://maven.pkg.github.com/JWebMP/Packages",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              },
              {
                "id": "shibboleth",
                "name": "shibboleth",
                "url": "https://build.shibboleth.net/nexus/content/repositories/releases",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]

      # ══════════════════════════════════════════════
      # Layer 0 – Versioner (root of all BOMs)
      # ══════════════════════════════════════════════
      - name: 'BOM: Versioner'
        run: mvn -B deploy --file GuicedEE/bom/Versioner/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 1 – Sub-BOMs (all depend on Versioner)
      # ══════════════════════════════════════════════
      - name: 'BOM: Standalone'
        run: mvn -B deploy --file GuicedEE/bom/StandaloneBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Tests'
        run: mvn -B deploy --file GuicedEE/bom/TestLayoutBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Swagger'
        run: mvn -B deploy --file GuicedEE/bom/SwaggerBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: JBoss'
        run: mvn -B deploy --file GuicedEE/bom/JBossBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Jakarta'
        run: mvn -B deploy --file GuicedEE/bom/JakartaBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Hibernate'
        run: mvn -B deploy --file GuicedEE/bom/HibernateBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Google'
        run: mvn -B deploy --file GuicedEE/bom/GoogleBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: FasterXML'
        run: mvn -B deploy --file GuicedEE/bom/FasterXMLBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Apache'
        run: mvn -B deploy --file GuicedEE/bom/ApacheBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: Apache CXF'
        run: mvn -B deploy --file GuicedEE/bom/ApacheCXFBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'BOM: SmallRye'
        run: mvn -B deploy --file GuicedEE/bom/SmallRyeBOM/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 2 – GuicedEE BOM (depends on all sub-BOMs)
      # ══════════════════════════════════════════════
      - name: 'BOM: GuicedEE'
        run: mvn -B deploy --file GuicedEE/bom/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 3 – Parent POM
      # ══════════════════════════════════════════════
      - name: 'BOM: GuicedEE Parent'
        run: mvn -B deploy --file GuicedEE/parent/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 4 – Services depending only on Parent
      # ══════════════════════════════════════════════
      - name: 'Build: AOP Alliance'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Google/aop/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Vert.x Mutiny'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Vert.x/vertx-mutiny/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Config Core'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/MicroProfile/config-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Health Core'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/MicroProfile/health-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Metrics Core'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/MicroProfile/metrics-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Telemetry Core'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/MicroProfile/telemetry-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Jandex'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Libraries/jandex/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Swagger Services'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Libraries/swagger/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: AMQP Client'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Libraries/rabbitmq-client/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: Cache API'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/JCache/cache-api/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 4b – Services with one dependency above
      # ══════════════════════════════════════════════
      - name: 'Build: Vert.x RabbitMQ'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Vert.x/vertx-rabbitmq/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: EHCache'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/JCache/ehcache/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 5 – Guice Core (depends on AOP)
      # ══════════════════════════════════════════════
      - name: 'Build: Google Guice'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Google/guice-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 5b – Hibernate Core (depends on Jandex, EHCache)
      # ══════════════════════════════════════════════
      - name: 'Build: Hibernate Core'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Hibernate/hibernate-core/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 5c – Hibernate Reactive (depends on Hibernate Core)
      # ══════════════════════════════════════════════
      - name: 'Build: Hibernate Reactive'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/services/Hibernate/hibernate-reactive/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 6 – Guice Inject Client (depends on Guice)
      # ══════════════════════════════════════════════
      - name: 'Build: Guice Inject Client'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/client/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 7 – Representations (depend on Client)
      # ══════════════════════════════════════════════
      - name: 'Build: JSON Representation'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/representations/json/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      - name: 'Build: XML Representation'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/representations/xml/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 8 – Guiced Vert.x (depends on Client, JSON, Vert.x Mutiny)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Vert.x'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/vertx/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 9 – Guiced Inject (depends on Client, Vertx, Config Core)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Inject'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/inject/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 9a – Guiced Rabbit (depends on Client, JSON, Vertx, Vertx-RabbitMQ, AMQP)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Rabbit'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/rabbitmq/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 9b – Guiced Web (depends on Vertx, Client, JSON)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Web'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/web/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10 – Guiced Rest (depends on Web, XML)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Rest'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/rest/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10b – Guiced Rest Client (depends on Inject, XML)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Rest Client'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/rest-client/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10c – Guiced Websockets (depends on Web)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Websockets'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/websockets/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10d – Guiced Config (depends on Client, Vertx, Config Core)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Config'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/config/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10e – Guiced OpenAPI (depends on Web, Swagger Services)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced OpenAPI'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/openapi/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10f – Guiced Swagger UI (depends on Web)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Swagger UI'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/swagger-ui/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 10g – Guiced CDI (depends on Inject)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced CDI'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/cdi/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 11 – Guiced Health (depends on Vertx, Client, Inject, Health Core)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Health'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/health/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 11b – Guiced Metrics (depends on Web, Inject, Metrics Core)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Metrics'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/metrics/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 11c – Guiced Persistence (depends on Config, Vertx, Client, JSON, Inject, Rest, Hibernate Reactive)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Persistence'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/persistence/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 12 – Guiced Telemetry (depends on Telemetry Core, JSON, Vertx, Health, Inject)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Telemetry'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/telemetry/pom.xml -U ${{ env.CENTRAL_PROFILE }}

      # ══════════════════════════════════════════════
      # Layer 13 – Guiced Cerial (depends on Health, Telemetry, Vertx, JSON, Client, Inject)
      # ══════════════════════════════════════════════
      - name: 'Build: Guiced Cerial'
        run: mvn -B source:jar javadoc:jar deploy --file GuicedEE/cerial/pom.xml -U ${{ env.CENTRAL_PROFILE }}
