name: By Job

on:
  workflow_dispatch:
    inputs:
      centralRelease:
        type: boolean
        description: Run a release to Maven Central (requires secrets)
        default: false

jobs:

  # ──────────────────────────────────────────────
  # Layer 0 – Versioner (root of all BOMs)
  # ──────────────────────────────────────────────
  Versioner:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'Versioner/'
      name: 'Versioner'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 1 – Sub-BOMs (all depend on Versioner, run in parallel)
  # ──────────────────────────────────────────────
  Standalone-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'StandaloneBOM/'
      name: 'Standalone BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Tests-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'TestLayoutBOM/'
      name: 'Tests BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Swagger-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'SwaggerBOM/'
      name: 'Swagger BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  JBoss-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'JBossBOM/'
      name: 'JBoss BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Jakarta-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'JakartaBOM/'
      name: 'Jakarta BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Hibernate-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'HibernateBOM/'
      name: 'Hibernate BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Google-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'GoogleBOM/'
      name: 'Google BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  FasterXML-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'FasterXMLBOM/'
      name: 'FasterXML BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Apache-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'ApacheBOM/'
      name: 'Apache BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  ApacheCXF-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'ApacheCXFBOM/'
      name: 'Apache CXF BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  JWebMP-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'JWebMP/BOM'
      name: 'JWebMP BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  SmallRye-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !cancelled() && needs.Versioner.result == 'success' }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'SmallRyeBOM/'
      name: 'SmallRye BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 2 – GuicedEE BOM (depends on all sub-BOMs)
  # ──────────────────────────────────────────────
  GuicedEE-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - Standalone-BOM
      - Tests-BOM
      - Swagger-BOM
      - JBoss-BOM
      - Jakarta-BOM
      - Hibernate-BOM
      - Google-BOM
      - FasterXML-BOM
      - Apache-BOM
      - ApacheCXF-BOM
      - SmallRye-BOM
    if: ${{ !cancelled() && needs.Standalone-BOM.result != 'failure' && needs.Tests-BOM.result != 'failure' && needs.Swagger-BOM.result != 'failure' && needs.JBoss-BOM.result != 'failure' && needs.Jakarta-BOM.result != 'failure' && needs.Hibernate-BOM.result != 'failure' && needs.Google-BOM.result != 'failure' && needs.FasterXML-BOM.result != 'failure' && needs.Apache-BOM.result != 'failure' && needs.ApacheCXF-BOM.result != 'failure' && needs.SmallRye-BOM.result != 'failure' }}
    with:
      repository: 'GuicedEE/BOM'
      name: 'GuicedEE BOM'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 3 – Parent POM (depends on Versioner + GuicedEE BOM)
  # ──────────────────────────────────────────────
  Parent:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - GuicedEE-BOM
    if: ${{ !cancelled() && needs.GuicedEE-BOM.result == 'success' }}
    with:
      repository: 'GuicedEE/Parent'
      name: 'GuicedEE Parent'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 3b – JWebMP Parent (depends on GuicedEE Parent + JWebMP BOM)
  # ──────────────────────────────────────────────
  JWebMP-Parent:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - Parent
      - JWebMP-BOM
    if: ${{ !cancelled() && needs.Parent.result == 'success' && needs.JWebMP-BOM.result == 'success' }}
    with:
      repository: 'JWebMP/Parent'
      name: 'JWebMP Parent'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 4 – Services depending only on Parent (parallel)
  # ──────────────────────────────────────────────
  AOP:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Google/aop/'
      name: 'AOP Alliance'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Vertx-Mutiny:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Vert.x/vertx-mutiny/'
      name: 'Vert.x Mutiny'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Config-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/config-core/'
      name: 'Config Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Health-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/health-core/'
      name: 'Health Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Metrics-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/metrics-core/'
      name: 'Metrics Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Telemetry-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/telemetry-core/'
      name: 'Telemetry Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Jandex:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/jandex/'
      name: 'Jandex'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Swagger-Services:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/swagger/'
      name: 'Swagger Services'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  AMQP-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/rabbitmq-client/'
      name: 'AMQP Client'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  UADetector-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/uadetector-core/'
      name: 'UADetector Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  UADetector-Resources:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - UADetector-Core
    if: ${{ !cancelled() && needs.UADetector-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/uadetector-resources/'
      name: 'UADetector Resources'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Vertx-RabbitMQ:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - AMQP-Client
    if: ${{ !cancelled() && needs.AMQP-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Vert.x/vertx-rabbitmq/'
      name: 'Vert.x RabbitMQ'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  Cache-API:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !cancelled() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/cache-api/'
      name: 'Cache API'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  EHCache:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Cache-API
    if: ${{ !cancelled() && needs.Cache-API.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/ehcache/'
      name: 'EHCache'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5 – Guice Core (depends on AOP)
  # ──────────────────────────────────────────────
  Guice:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - AOP
    if: ${{ !cancelled() && needs.AOP.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Google/guice-core/'
      name: 'Google Guice'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5b – Hibernate Core (depends on Jandex, EHCache)
  # ──────────────────────────────────────────────
  Hibernate-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Jandex
      - EHCache
    if: ${{ !cancelled() && needs.Jandex.result == 'success' && needs.EHCache.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Hibernate/hibernate-core/'
      name: 'Hibernate Core'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5c – Hibernate Reactive (depends on Hibernate Core)
  # ──────────────────────────────────────────────
  Hibernate-Reactive:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Hibernate-Core
    if: ${{ !cancelled() && needs.Hibernate-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Hibernate/hibernate-reactive/'
      name: 'Hibernate Reactive'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 6 – guice-inject-client (depends on Guice)
  # ──────────────────────────────────────────────
  Guice-Inject-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice
    if: ${{ !cancelled() && needs.Guice.result == 'success' }}
    with:
      repository: 'GuicedEE/Client'
      name: 'Guice Inject Client'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 7 – JSON Representation (depends on Guice-Inject-Client)
  # ──────────────────────────────────────────────
  JSON-Representation:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Representations'
      baseDir: 'json/'
      name: 'JSON Representation'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 7b – XML Representation (depends on Guice-Inject-Client)
  # ──────────────────────────────────────────────
  XML-Representation:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Representations'
      baseDir: 'xml/'
      name: 'XML Representation'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 8 – Guiced Vert.x (depends on Client, JSON Representation, Vert.x Mutiny)
  # ──────────────────────────────────────────────
  Guiced-Vertx:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Vertx-Mutiny
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Vertx-Mutiny.result == 'success' }}
    with:
      repository: 'GuicedEE/Guiced-Vert.x'
      name: 'Guiced Vert.x'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 8b – JWebMP Client (depends on JWebMP Parent, Guice-Inject-Client, JSON-Representation, UADetector-Resources)
  # ──────────────────────────────────────────────
  JWebMP-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - JWebMP-Parent
      - Guice-Inject-Client
      - JSON-Representation
      - UADetector-Resources
    if: ${{ !cancelled() && needs.JWebMP-Parent.result == 'success' && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.UADetector-Resources.result == 'success' }}
    with:
      repository: 'JWebMP/Client'
      name: 'JWebMP Client'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9 – Guiced Inject (depends on Client, Vertx, Config Core)
  # ──────────────────────────────────────────────
  Guiced-Inject:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - Guiced-Vertx
      - Config-Core
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Config-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedInjection'
      name: 'Guiced Inject'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9a – Guiced Rabbit (depends on Guice-Inject-Client, JSON Representation, Guiced Vert.x, Vertx-RabbitMQ, AMQP-Client)
  # ──────────────────────────────────────────────
  Guiced-Rabbit:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Guiced-Vertx
      - Vertx-RabbitMQ
      - AMQP-Client
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Vertx-RabbitMQ.result == 'success' && needs.AMQP-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedRabbit'
      name: 'Guiced Rabbit'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9b – Guiced Web (depends on Guiced Vert.x, Guice-Inject-Client, JSON Representation)
  # ──────────────────────────────────────────────
  Guiced-Web:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Vertx
      - Guice-Inject-Client
      - JSON-Representation
    if: ${{ !cancelled() && needs.Guiced-Vertx.result == 'success' && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedVertxWeb'
      name: 'Guiced Web'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9c – JWebMP TestLib (depends on JWebMP Parent, Guiced Inject, Guiced Web)
  # ──────────────────────────────────────────────
  JWebMP-TestLib:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - JWebMP-Parent
      - Guiced-Inject
      - Guiced-Web
    if: ${{ !cancelled() && needs.JWebMP-Parent.result == 'success' && needs.Guiced-Inject.result == 'success' && needs.Guiced-Web.result == 'success' }}
    with:
      repository: 'JWebMP/Test-Library'
      name: 'JWebMP TestLib'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10 – Guiced Rest (depends on Web, XML Representation)
  # ──────────────────────────────────────────────
  Guiced-Rest:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Web
      - XML-Representation
    if: ${{ !cancelled() && needs.Guiced-Web.result == 'success' && needs.XML-Representation.result == 'success' }}
    with:
      repository: 'GuicedEE/RestServices'
      name: 'Guiced Rest'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10c – Guiced Websockets (depends on Guiced Web)
  # ──────────────────────────────────────────────
  Guiced-Websockets:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Web
    if: ${{ !cancelled() && needs.Guiced-Web.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedVertxSockets'
      name: 'Guiced Websockets'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10e – Guiced OpenAPI (depends on Guiced Web, Swagger Services)
  # ──────────────────────────────────────────────
  Guiced-OpenAPI:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Web
      - Swagger-Services
    if: ${{ !cancelled() && needs.Guiced-Web.result == 'success' && needs.Swagger-Services.result == 'success' }}
    with:
      repository: 'GuicedEE/OpenAPI'
      name: 'Guiced OpenAPI'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10f – Guiced Swagger UI (depends on Guiced Web)
  # ──────────────────────────────────────────────
  Guiced-Swagger-UI:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Web
    if: ${{ !cancelled() && needs.Guiced-Web.result == 'success' }}
    with:
      repository: 'GuicedEE/SwaggerUI'
      name: 'Guiced Swagger UI'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10b – Guiced Rest Client (depends on Guiced Inject, XML Representation)
  # ──────────────────────────────────────────────
  Guiced-Rest-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Inject
      - XML-Representation
    if: ${{ !cancelled() && needs.Guiced-Inject.result == 'success' && needs.XML-Representation.result == 'success' }}
    with:
      repository: 'GuicedEE/Rest-Client'
      name: 'Guiced Rest Client'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 10d – Guiced Config (depends on Guice-Inject-Client, Guiced Vert.x, Config Core)
  # ──────────────────────────────────────────────
  Guiced-Config:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - Guiced-Vertx
      - Config-Core
    if: ${{ !cancelled() && needs.Guice-Inject-Client.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Config-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/microprofile-config'
      name: 'Guiced Config'
      publishToCentral: ${{inputs.centralRelease}}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 11 – Guiced Health (depends on Guiced Vert.x, Guice-Inject-Client, Guiced Inject, Health Core)
  # ──────────────────────────────────────────────
  Guiced-Health:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Vertx
      - Guice-Inject-Client
      - Guiced-Inject
      - Health-Core
