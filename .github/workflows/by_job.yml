  # ──────────────────────────────────────────────
  # Final – Create Git Tag & GitHub Release
  # ──────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.centralRelease && !failure() }}
    needs:
      - AM-Cerial
      - AM-Conversations
      - AM-Documents
      - AM-Files
      - AM-Forums
      - AM-Images
      - AM-Mail
      - AM-Notifications
      - AM-Payments
      - AM-Realtor
      - AM-ToDo
      - AM-Wallet
      - Cache-Annotations-RI-Guice
      - Guiced-CDI
      - Guiced-Fault-Tolerance
      - Guiced-Kafka
      - Guiced-Metrics
      - Guiced-OpenAPI
      - Guiced-Rest-Client
      - Guiced-Swagger-UI
      - Guiced-Websockets
      - Hazelcast-Hibernate
      - JWebMP-AgGrid-Enterprise
      - JWebMP-Angular-Maven-Plugin
      - JWebMP-ChartJS
      - JWebMP-FullCalendar-Pro
      - JWebMP-Markdown
      - JWebMP-RabbitComms
      - JWebMP-WebAwesome-Pro
    name: Create Release Tag
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.BUILD_TOKEN }}
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.BUILD_TOKEN }}
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if echo "$VERSION" | grep -q "SNAPSHOT"; then
            echo "SNAPSHOT version ($VERSION) – skipping tag/release"
            exit 0
          fi
          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release creation"
            exit 0
          fi
          echo "Creating tag $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin "$TAG"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            gh release create "$TAG" --title "Release $VERSION" --generate-notes --notes-start-tag "$PREV_TAG"
          else
            gh release create "$TAG" --title "Release $VERSION" --notes "Initial release $VERSION"
          fi
