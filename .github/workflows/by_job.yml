name: By Job

on:
  workflow_dispatch:
    inputs:
      centralRelease:
        type: boolean
        description: Run a release to Maven Central (requires secrets)
        default: false
      skipVersioner:
        type: boolean
        description: Skip the Versioner step (use when Versioner is already published)
        default: false

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write

jobs:

  # ──────────────────────────────────────────────
  # Layer 0 – Versioner (root of all BOMs)
  # ──────────────────────────────────────────────
  Versioner:
    if: ${{ !inputs.skipVersioner }}
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'Versioner/'
      name: 'Versioner'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 1 – Standalone BOM (depends on Versioner)
  # ──────────────────────────────────────────────
  Standalone-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'StandaloneBOM/'
      name: 'Standalone BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 2 – Sub-BOMs that depend on Standalone (parallel)
  # ──────────────────────────────────────────────
  Tests-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'TestLayoutBOM/'
      name: 'Tests BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Swagger-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'SwaggerBOM/'
      name: 'Swagger BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  JBoss-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'JBossBOM/'
      name: 'JBoss BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Jakarta-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'JakartaBOM/'
      name: 'Jakarta BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Hibernate-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'HibernateBOM/'
      name: 'Hibernate BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Google-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'GoogleBOM/'
      name: 'Google BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Apache-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'ApacheBOM/'
      name: 'Apache BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  ApacheCXF-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'ApacheCXFBOM/'
      name: 'Apache CXF BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  SmallRye-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'SmallRyeBOM/'
      name: 'SmallRye BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # JWebMP BOM only depends on Versioner (separate repo)
  JWebMP-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Versioner, GuicedEE-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'JWebMP/BOM'
      name: 'JWebMP BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 3 – FasterXML BOM (depends on Standalone + Jakarta)
  # ──────────────────────────────────────────────
  FasterXML-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs: [ Standalone-BOM, Jakarta-BOM ]
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      baseDir: 'FasterXMLBOM/'
      name: 'FasterXML BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 4 – GuicedEE BOM (depends on all sub-BOMs)
  # ──────────────────────────────────────────────
  GuicedEE-BOM:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - Standalone-BOM
      - Tests-BOM
      - Swagger-BOM
      - JBoss-BOM
      - Jakarta-BOM
      - Hibernate-BOM
      - Google-BOM
      - FasterXML-BOM
      - Apache-BOM
      - ApacheCXF-BOM
      - SmallRye-BOM
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/BOM'
      name: 'GuicedEE BOM'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5 – Parent POM (depends on GuicedEE BOM)
  # ──────────────────────────────────────────────
  Parent:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - GuicedEE-BOM
    if: ${{ !failure() }}
    with:
      repository: 'GuicedEE/Parent'
      name: 'GuicedEE Parent'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5b – JWebMP Parent (depends on GuicedEE Parent + JWebMP BOM)
  # ──────────────────────────────────────────────
  JWebMP-Parent:
    uses: GuicedEE/Workflows/.github/workflows/bom.yml@master
    needs:
      - Parent
      - JWebMP-BOM
    if: ${{ !failure() }}
    with:
      repository: 'JWebMP/Parent'
      name: 'JWebMP Parent'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 4 – Services depending only on Parent (parallel)
  # ──────────────────────────────────────────────
  AOP:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Google/aop/'
      name: 'AOP Alliance'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Vertx-Mutiny:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Vert.x/vertx-mutiny/'
      name: 'Vert.x Mutiny'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Config-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/config-core/'
      name: 'Config Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Health-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/health-core/'
      name: 'Health Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Metrics-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/metrics-core/'
      name: 'Metrics Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Telemetry-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/telemetry-core/'
      name: 'Telemetry Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Fault-Tolerance-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'MicroProfile/fault-tolerance-core/'
      name: 'Fault Tolerance Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Jandex:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/jandex/'
      name: 'Jandex'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Swagger-Services:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/swagger/'
      name: 'Swagger Services'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  AMQP-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/rabbitmq-client/'
      name: 'AMQP Client'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Kafka-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/kafka-client/'
      name: 'Kafka Client'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  UADetector-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/uadetector-core/'
      name: 'UADetector Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  UADetector-Resources:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - UADetector-Core
    if: ${{ !failure() && needs.UADetector-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Libraries/uadetector-resources/'
      name: 'UADetector Resources'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Vertx-RabbitMQ:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - AMQP-Client
    if: ${{ !failure() && needs.AMQP-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Vert.x/vertx-rabbitmq/'
      name: 'Vert.x RabbitMQ'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Vertx-Kafka:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Kafka-Client
    if: ${{ !failure() && needs.Kafka-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Vert.x/vertx-kafka/'
      name: 'Vert.x Kafka'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Cache-API:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Parent
    if: ${{ !failure() && needs.Parent.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/cache-api/'
      name: 'Cache API'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  EHCache:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Cache-API
    if: ${{ !failure() && needs.Cache-API.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/ehcache/'
      name: 'EHCache'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  Cache-Annotations-RI-Common:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Cache-API
    if: ${{ !failure() && needs.Cache-API.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/cache-annotations-ri-common/'
      name: 'Cache Annotations RI Common'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5 – Guice Core (depends on AOP)
  # ──────────────────────────────────────────────
  Guice:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - AOP
    if: ${{ !failure() && needs.AOP.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Google/guice-core/'
      name: 'Google Guice'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5b – Hibernate Core (depends on Jandex, EHCache)
  # ──────────────────────────────────────────────
  Hibernate-Core:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Jandex
      - EHCache
    if: ${{ !failure() && needs.Jandex.result == 'success' && needs.EHCache.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Hibernate/hibernate-core/'
      name: 'Hibernate Core'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 5c – Hibernate Reactive (depends on Hibernate Core)
  # ──────────────────────────────────────────────
  Hibernate-Reactive:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Hibernate-Core
    if: ${{ !failure() && needs.Hibernate-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'Hibernate/hibernate-reactive/'
      name: 'Hibernate Reactive'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 6 – guice-inject-client (depends on Guice)
  # ──────────────────────────────────────────────
  Guice-Inject-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice
    if: ${{ !failure() && needs.Guice.result == 'success' }}
    with:
      repository: 'GuicedEE/Client'
      name: 'Guice Inject Client'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 6b – Cache Annotations RI Guice (depends on Cache-Annotations-RI-Common, Guice, Guice-Inject-Client)
  # ──────────────────────────────────────────────
  Cache-Annotations-RI-Guice:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Cache-Annotations-RI-Common
      - Guice
      - Guice-Inject-Client
    if: ${{ !failure() && needs.Cache-Annotations-RI-Common.result == 'success' && needs.Guice.result == 'success' && needs.Guice-Inject-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/cache-annotations-ri-guice/'
      name: 'Cache Annotations RI Guice'
      publishToCentral: ${{ inputs.centralRelease }}
      skipDeploy: 'false'
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 6c – Hazelcast (depends on Cache-API, Hibernate-Core)
  # ──────────────────────────────────────────────
  Hazelcast:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Cache-API
      - Hibernate-Core
    if: ${{ !failure() && needs.Cache-API.result == 'success' && needs.Hibernate-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/hazelcast/'
      name: 'Hazelcast'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 6d – Hazelcast Hibernate (depends on Hazelcast, Hibernate-Core)
  # ──────────────────────────────────────────────
  Hazelcast-Hibernate:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Hazelcast
      - Hibernate-Core
    if: ${{ !failure() && needs.Hazelcast.result == 'success' && needs.Hibernate-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/Services'
      baseDir: 'JCache/hazelcast-hibernate/'
      name: 'Hazelcast Hibernate'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 7 – JSON Representation (depends on Guice-Inject-Client)
  # ──────────────────────────────────────────────
  JSON-Representation:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/JsonRepresentation'
      name: 'JSON Representation'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 7b – XML Representation (depends on Guice-Inject-Client)
  # ──────────────────────────────────────────────
  XML-Representation:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/XMLRepresentation'
      name: 'XML Representation'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 8 – Guiced Vert.x (depends on Client, JSON Representation, Vert.x Mutiny)
  # ──────────────────────────────────────────────
  Guiced-Vertx:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Vertx-Mutiny
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Vertx-Mutiny.result == 'success' }}
    with:
      repository: 'GuicedEE/Guiced-Vert.x'
      name: 'Guiced Vert.x'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 8b – JWebMP Client (depends on JWebMP Parent, Guice-Inject-Client, JSON-Representation, UADetector-Resources)
  # ──────────────────────────────────────────────
  JWebMP-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - JWebMP-Parent
      - Guice-Inject-Client
      - JSON-Representation
      - UADetector-Resources
    if: ${{ !failure() && needs.JWebMP-Parent.result == 'success' && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.UADetector-Resources.result == 'success' }}
    with:
      repository: 'JWebMP/Client'
      name: 'JWebMP Client'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9 – Guiced Inject (depends on Client, Vertx, Config Core)
  # ──────────────────────────────────────────────
  Guiced-Inject:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - Guiced-Vertx
      - Config-Core
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Config-Core.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedInjection'
      name: 'Guiced Inject'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9a – Guiced Rabbit (depends on Guice-Inject-Client, JSON Representation, Guiced Vert.x, Vertx-RabbitMQ, AMQP-Client)
  # ──────────────────────────────────────────────
  Guiced-Rabbit:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Guiced-Vertx
      - Vertx-RabbitMQ
      - AMQP-Client
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Vertx-RabbitMQ.result == 'success' && needs.AMQP-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedRabbit'
      name: 'Guiced Rabbit'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9a2 – Guiced Kafka (depends on Guice-Inject-Client, JSON Representation, Guiced Vert.x, Vertx-Kafka, Kafka-Client)
  # ──────────────────────────────────────────────
  Guiced-Kafka:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Guiced-Vertx
      - Vertx-Kafka
      - Kafka-Client
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Guiced-Vertx.result == 'success' && needs.Vertx-Kafka.result == 'success' && needs.Kafka-Client.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedKafka'
      name: 'Guiced Kafka'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9a3 – Guiced Mail Client (depends on Guice-Inject-Client, JSON Representation, Guiced Vert.x)
  # ──────────────────────────────────────────────
  Guiced-Mail-Client:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guice-Inject-Client
      - JSON-Representation
      - Guiced-Vertx
    if: ${{ !failure() && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' && needs.Guiced-Vertx.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedMailClient'
      name: 'Guiced Mail Client'
      publishToCentral: ${{ inputs.centralRelease }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Layer 9b – Guiced Web (depends on Guiced Vert.x, Guice-Inject-Client, JSON Representation)
  # ──────────────────────────────────────────────
  Guiced-Web:
    uses: GuicedEE/Workflows/.github/workflows/projects.yml@master
    needs:
      - Guiced-Vertx
      - Guice-Inject-Client
      - JSON-Representation
    if: ${{ !failure() && needs.Guiced-Vertx.result == 'success' && needs.Guice-Inject-Client.result == 'success' && needs.JSON-Representation.result == 'success' }}
    with:
      repository: 'GuicedEE/GuicedVertxWeb'
      name: 'Guiced Web'
