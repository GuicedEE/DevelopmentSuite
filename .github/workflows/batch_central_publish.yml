name: Batch Central Publishing

on:
  workflow_dispatch:
    inputs:
      centralRelease:
        type: boolean
        description: Run a release to Maven Central (requires secrets)
        default: true
      skipTests:
        type: boolean
        description: Skip tests during the build
        default: true
      deployVersioner:
        type: boolean
        description: Deploy the Versioner BOM (foundation for all other BOMs)
        default: true
      profileGuicedee:
        type: boolean
        description: Include the 'guicedee' profile
        default: true
      profileServices:
        type: boolean
        description: Include the 'services' profile
        default: true
      profileEntityassist:
        type: boolean
        description: Include the 'entityassist' profile
        default: true
      profileJwebmp:
        type: boolean
        description: Include the 'jwebmp' profile
        default: true
      profileWebsites:
        type: boolean
        description: Include the 'websites' profile
        default: true
      profileActivityMaster:
        type: boolean
        description: Include the 'activity-master' profile
        default: true

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write

env:
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Batch Central Publishing
    steps:

      # ── Checkout with all submodules ────────────────
      - uses: actions/checkout@v6.0.2
        with:
          submodules: 'recursive'
          fetch-depth: 0
          show-progress: true
          token: ${{ secrets.BUILD_TOKEN }}

      # ── Setup Java 25 (required by project) ─────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # ── Cache Maven packages ────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # ── Setup Maven 4.0.0-rc-5 (required by project) ─
      - name: Setup Maven
        uses: actionctl/setup-maven-cli@v1
        with:
          maven_version: '4.0.0-rc-5'
          download_url_pattern: 'https://dlcdn.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz'

      # ── Configure Maven Settings ───────────────────
      - name: Update Settings.xml
        uses: s4u/maven-settings-action@45b6ca948aeeb205adebe97c67b26e2b50896844 # v4.0.0
        with:
          sonatypeSnapshots: true
          servers: >
            [
              {
                "id": "github",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "packages",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "packages_jwebmp",
                "username": "${{ secrets.USERNAME }}",
                "password": "${{ secrets.USER_TOKEN }}"
              },
              {
                "id": "sona-snapshot",
                "username": "${{ secrets.SONA_USERNAME }}",
                "password": "${{ secrets.SONA_PASSWORD }}"
              },
              {
                "id": "sona-release",
                "username": "${{ secrets.SONA_USERNAME }}",
                "password": "${{ secrets.SONA_PASSWORD }}"
              },
              {
                "id": "central",
                "username": "${{ secrets.SONA_USERNAME }}",
                "password": "${{ secrets.SONA_PASSWORD }}"
              }
            ]
          repositories: >
            [
              {
                "id": "packages",
                "name": "packages",
                "url": "https://maven.pkg.github.com/GuicedEE/Packages",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              },
              {
                "id": "packages_jwebmp",
                "name": "packages_jwebmp",
                "url": "https://maven.pkg.github.com/JWebMP/Packages",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              },
              {
                "id": "shibboleth",
                "name": "shibboleth",
                "url": "https://build.shibboleth.net/nexus/content/repositories/releases",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]

      # ── Build Active Profiles String ─────────────────
      - name: Build profiles list
        id: profiles
        run: |
          PROFILES=""
          if [ "${{ inputs.profileGuicedee }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}guicedee"; fi
          if [ "${{ inputs.profileServices }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}services"; fi
          if [ "${{ inputs.profileEntityassist }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}entityassist"; fi
          if [ "${{ inputs.profileJwebmp }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}jwebmp"; fi
          if [ "${{ inputs.profileWebsites }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}websites"; fi
          if [ "${{ inputs.profileActivityMaster }}" = "true" ]; then PROFILES="${PROFILES:+$PROFILES,}activity-master"; fi
          echo "active=$PROFILES" >> "$GITHUB_OUTPUT"
          echo "Resolved profiles: $PROFILES"

      # ── Deploy Versioner BOM ──────────────────────
      # The Versioner BOM is the foundation for all other BOMs and must be deployed first.
      - name: 'Maven: Deploy Versioner'
        if: ${{ inputs.deployVersioner }}
        run: >
          mvn -B -ntp deploy
          --file GuicedEE/bom/Versioner/pom.xml
          -DskipTests
          ${{ inputs.centralRelease && '-Dcentral.publishing.skip=false -Dmaven.deploy.skip=true' || '' }}
          -U

      # ── Run Batch Deployment ───────────────────────
      # This command builds and deploys everything in the correct order as defined by the Maven reactor
      # using the profiles defined in the root pom.xml.
      # NOTE: When running locally on PowerShell, quote the -P argument to avoid comma parsing errors:
      #   mvn source:jar javadoc:jar deploy "-Pguicedee,services" -DskipTests -U
      - name: 'Maven: Batch Deploy'
        if: ${{ steps.profiles.outputs.active != '' }}
        run: >
          mvn -B -ntp source:jar javadoc:jar deploy
          "-P${{ steps.profiles.outputs.active }}"
          -Dmaven.javadoc.failOnError=false
          ${{ inputs.skipTests && '-DskipTests' || '' }}
          ${{ inputs.centralRelease && '-Dcentral.publishing.skip=false -Dmaven.deploy.skip=true' || '' }}
          -U